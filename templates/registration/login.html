{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso al Sistema - CMDLT</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cmdlt-blue: #1a5caa;
            --cmdlt-green: #4aaf46;
            --cmdlt-green-hover: #49a942;
            --bg-color: #f0f4f8;
            --text-main: #333333;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }

        .card-custom {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(26, 92, 170, 0.08);
            border: none;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            padding: 40px 30px 20px 30px;
        }

        .logo-container img {
            max-width: 220px;
            height: auto;
        }

        .form-control-custom {
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid #dce4ec;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control-custom:focus {
            background-color: #ffffff;
            border-color: var(--cmdlt-blue);
            box-shadow: 0 0 0 4px rgba(26, 92, 170, 0.1);
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--cmdlt-blue);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-custom {
            background-color: var(--cmdlt-green);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(74, 175, 70, 0.2);
        }

        .btn-custom:hover {
            background-color: var(--cmdlt-green-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(74, 175, 70, 0.3);
            color: white;
        }

        .btn-custom:disabled {
            background-color: #9acb8e;
            transform: none;
            box-shadow: none;
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #6c757d;
            line-height: 1.5;
        }

        .footer-text strong {
            color: var(--cmdlt-blue);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="card-custom">
            
            <!-- Contenedor del Logo Institucional -->
            <div class="logo-container">
                <img src="{% static 'img/logo-centro-medico-docente-la-trinidad.svg' %}" alt="Logo Centro Médico Docente La Trinidad">
            </div>
            
            <div class="card-body px-4 pb-5 pt-2" id="login-container">
                
                <!-- Errores renderizados por Django -->
                {% if messages %}
                    <div class="messages mb-4">
                        {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} text-center py-2" role="alert" style="font-size: 0.85rem; border-radius: 8px;">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <!-- Errores generados por JavaScript -->
                <div id="js-error-container" class="alert alert-danger text-center py-2" style="display: none; font-size: 0.85rem; border-radius: 8px;" role="alert"></div>

                <!-- Token CSRF oculto -->
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="cred_alpha" class="form-label">Usuario SAP</label>
                    <input type="text" id="cred_alpha" class="form-control form-control-custom" autocomplete="one-time-code" spellcheck="false" placeholder="Escriba su usuario">
                </div>
                
                <div class="mb-4">
                    <label for="cred_beta" class="form-label">Contraseña</label>
                    <input type="text" id="cred_beta" class="form-control form-control-custom" autocomplete="one-time-code" spellcheck="false" placeholder="Escriba su contraseña" style="-webkit-text-security: disc;">
                </div>

                <div class="d-grid mt-4">
                    <button type="button" id="btn-login" class="btn btn-custom">
                        Iniciar Sesión
                    </button>
                </div>
            </div>
        </div>

        <!-- Pie de Página Institucional -->
        <div class="footer-text">
            <strong>Gerencia de Sistemas</strong>
        <br>
            <p>&copy;1966 - {% now "Y" %} | RIF J-00058551-2 | Todos los derechos reservados</p>
        </br>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const btnLogin = document.getElementById('btn-login');
            const fieldUser = document.getElementById('cred_alpha');
            const fieldPass = document.getElementById('cred_beta');
            const errorContainer = document.getElementById('js-error-container');
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

            function handleLogin() {
                const valUser = fieldUser.value;
                const valPass = fieldPass.value;

                if (!valUser || !valPass) {
                    errorContainer.textContent = "Por favor, complete ambos campos.";
                    errorContainer.className = 'alert alert-danger text-center py-2';
                    errorContainer.style.display = 'block';
                    return;
                }

                errorContainer.style.display = 'none';
                btnLogin.disabled = true;
                btnLogin.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Validando...';

                // Guardamos los valores y borramos la evidencia del DOM
                fieldUser.value = '';
                fieldPass.value = '';

                const formData = new URLSearchParams();
                formData.append('username', valUser);
                formData.append('password', valPass);
                formData.append('csrfmiddlewaretoken', csrfToken);
                formData.append('next', new URLSearchParams(window.location.search).get('next') || '/');

                fetch(window.location.pathname, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest',
                        'X-CSRFToken': csrfToken
                    },
                    body: formData.toString()
                })
                .then(response => {
                    if (response.ok && response.redirected) {
                         // Login exitoso, el servidor ordenó redirección
                         window.location.href = response.url;
                    } else if (response.ok) {
                        // El login falló. Django devuelve el HTML con los mensajes consumidos.
                        return response.text().then(html => {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(html, 'text/html');
                            
                            // Buscamos los mensajes renderizados por Django en la respuesta
                            const djangoMessages = doc.querySelector('.messages');
                            
                            if (djangoMessages) {
                                // Inyectamos los mensajes de SAP directamente en nuestro contenedor
                                errorContainer.innerHTML = djangoMessages.innerHTML;
                                errorContainer.className = 'messages mb-4'; // Quitamos clase alert para evitar doble borde
                                errorContainer.style.display = 'block';
                            } else {
                                // Fallback por si Django no mandó mensajes específicos
                                errorContainer.textContent = "Usuario o contraseña incorrectos.";
                                errorContainer.className = 'alert alert-danger text-center py-2';
                                errorContainer.style.display = 'block';
                            }
                            
                            // Restauramos el botón
                            btnLogin.disabled = false;
                            btnLogin.textContent = "Iniciar Sesión";
                        });
                    } else {
                         throw new Error('Error en el servidor');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    errorContainer.textContent = "Error de comunicación con SAP.";
                    errorContainer.className = 'alert alert-danger text-center py-2';
                    errorContainer.style.display = 'block';
                    btnLogin.disabled = false;
                    btnLogin.textContent = "Iniciar Sesión";
                });
            }

            btnLogin.addEventListener('click', handleLogin);

            fieldPass.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
            fieldUser.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>
</body>
</html>
