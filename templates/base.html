{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad Bancaria | CMDLT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            background-color: #f4f7fb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        /* Layout Flexbox para dividir pantalla */
        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Evita scroll horizontal al animar */
        }

        /* --- ESTILOS DEL SIDEBAR --- */
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background-color: #1a5caa; /* Azul Institucional del logo */
            color: #fff;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #4aaf46; /* Verde del logo */
            transition: all 0.3s ease-in-out; /* Animación suave */
            z-index: 1000;
        }
        #sidebar ul.components {
            padding: 20px 0;
            flex-grow: 1;
            overflow-y: auto;
        }
        
        #sidebar ul.components::-webkit-scrollbar {
            width: 5px;
        }
        #sidebar ul.components::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        #sidebar ul li a {
            padding: 12px 20px;
            font-size: 0.95rem;
            display: block;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        #sidebar ul li a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #4aaf46;
        }
        /* ⚡ CLASE MÁGICA PARA OCULTAR EL MENÚ */
        #sidebar.active {
            margin-left: -250px;
        }

        #sidebar .sidebar-header {
            padding: 15px;
            background: #fff;
            text-align: center;
            border-bottom: 2px solid #e0e4e8;
        }
        
        #sidebar .sidebar-header img {
            max-width: 90%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .swal2-toast {
            font-size: 0.8rem !important; /* Letra más pequeña */
            padding: 0.4rem 0.8rem !important; /* Menos espacio interno */
            min-height: 40px !important;
            width: auto !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
        }
        .swal2-title {
            margin: 0px 10px !important;
        }
        .swal2-icon {
            transform: scale(0.6); /* Achica el icono de éxito/error */
            margin: 0 !important;
        }
        /* --- SECCIÓN DE USUARIO AL FONDO --- */
        .user-section {
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            font-size: 0.9rem;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #content {
            width: 100%;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease-in-out;
        }

        /* ⚡ BARRA SUPERIOR PARA EL BOTÓN */
        .top-navbar {
            background-color: #fff;
            padding: 10px 20px;
            border-bottom: 1px solid #e0e4e8;
            display: flex;
            align-items: center;
            height: 55px; /* Altura fija para no robar mucho espacio */
        }
        
        .main-container {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto; /* Scroll independiente para el dashboard */
        }
        
        /* Ajuste estético para el select oscuro */
        select.border-secondary:focus {
            box-shadow: none;
            border-color: #4aaf46 !important;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav id="sidebar" class="shadow active">
            <div class="sidebar-header">
                <img src="{% static 'img/logo-centro-medico-docente-la-trinidad.svg' %}" alt="CMDLT Logo">
            </div>

            <ul class="list-unstyled components">
                <li>
                    <a href="{% url 'dashboard' %}"><i class="fas fa-table me-3"></i> Dashboard</a>
                </li>
                <li>
                    <a href="/admin/" target="_blank"><i class="fas fa-cogs me-3"></i> Configuración</a>
                </li>
            </ul>

            <div class="user-section">
                <div class="mb-3 text-center">
                    <i class="fas fa-user-circle fa-2x mb-2 text-light"></i><br>
                    <strong>{{ request.user.username|upper }}</strong>
                </div>
                
                <form action="{% url 'logout' %}" method="post" class="m-0 text-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-light w-100 fw-bold">
                        <i class="fas fa-sign-out-alt me-2"></i> Salir
                    </button>
                </form>
            </div>
        </nav>

        <div id="content">
            <div class="top-navbar shadow-sm">
                <button type="button" id="sidebarCollapse" class="btn btn-sm btn-outline-secondary border-0" title="Ocultar/Mostrar Menú" style="font-size: 1.2rem;">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="ms-3 text-muted fw-bold small">Gestión de Disponibilidad Bancaria</span>
            </div>

            <main class="main-container">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarCollapse');
            
            toggleBtn.addEventListener('click', function() {
                // Alterna la clase 'active' que mueve el menú hacia la izquierda
                sidebar.classList.toggle('active');
            });
        });
    </script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        // 1. Configuramos el diseño del Toast
        const Toast = Swal.mixin({
            toast: true,
            position: 'bottom-end', // 👈 CAMBIADO A LA ESQUINA INFERIOR DERECHA
            showConfirmButton: false,
            timer: 6000, 
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        // 👈 AÑADIR ESTA LÍNEA PARA HACERLO GLOBAL
        window.Toast = Toast; 

        // 2. Sistema Reutilizable de Notificaciones Inteligente
        class NotificationManager {
            constructor(endpoint, intervalMs = 2000) {
                this.endpoint = endpoint;
                this.intervalMs = intervalMs;
                this.intervalId = null;
                
                // Chequeo inicial automático al cargar la página
                this.checkNow();
            }

            async checkNow() {
                try {
                    const response = await fetch(this.endpoint);
                    if (!response.ok) return;
                    const data = await response.json();
                    
                    if (data.notificaciones && data.notificaciones.length > 0) {
                        data.notificaciones.forEach(notif => {
                            if (window.Toast) {
                                window.Toast.fire({ icon: notif.tipo, title: notif.mensaje });
                            }
                        });
                    }
                    
                    if (data.tareas_activas) {
                        this.startPolling();
                    } else {
                        this.stopPolling();
                    }
                } catch (error) {
                    console.error("Error consultando notificaciones:", error);
                }
            }

            startPolling() {
                if (!this.intervalId) {
                    this.intervalId = setInterval(() => this.checkNow(), this.intervalMs);
                }
            }

            stopPolling() {
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
            }

            // Método que deben llamar otros scripts cuando inician un proceso largo
            taskStarted() {
                if (!this.intervalId) {
                    this.checkNow();
                    this.startPolling();
                }
            }
        }

        // Instanciamos el sistema globalmente para poder usarlo desde cualquier archivo
        window.notifSystem = new NotificationManager('/api/notificaciones/');
    });
</script>
</body>
</html>
