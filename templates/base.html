{% load i18n %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad Bancaria | CMDLT</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            background-color: #f4f7fb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        /* Layout Flexbox para dividir pantalla */
        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Evita scroll horizontal al animar */
        }

        /* --- ESTILOS DEL SIDEBAR --- */
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background-color: #3c4295; /* Azul Institucional */
            color: #fff;
            display: flex;
            flex-direction: column;
            border-right: 4px solid #6eb43f; /* Línea verde */
            transition: all 0.3s ease-in-out; /* Animación suave */
            z-index: 1000;
        }

        /* ⚡ CLASE MÁGICA PARA OCULTAR EL MENÚ */
        #sidebar.active {
            margin-left: -250px;
        }

        #sidebar .sidebar-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        #sidebar .sidebar-header h3 {
            color: #fff;
            margin: 0;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        #sidebar ul.components {
            padding: 20px 0;
            flex-grow: 1; /* Ocupa el espacio vacío empujando el usuario abajo */
        }

        #sidebar ul li a {
            padding: 15px 25px;
            font-size: 1.05rem;
            display: block;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        #sidebar ul li a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #6eb43f; /* Indicador hover verde */
        }

        /* --- SECCIÓN DE USUARIO AL FONDO --- */
        .user-section {
            padding: 20px;
            background: rgba(0, 0, 0, 0.15);
            font-size: 0.9rem;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #content {
            width: 100%;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease-in-out;
        }

        /* ⚡ BARRA SUPERIOR PARA EL BOTÓN */
        .top-navbar {
            background-color: #fff;
            padding: 10px 20px;
            border-bottom: 1px solid #e0e4e8;
            display: flex;
            align-items: center;
            height: 55px; /* Altura fija para no robar mucho espacio */
        }
        
        .main-container {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto; /* Scroll independiente para el dashboard */
        }
        
        /* Ajuste estético para el select oscuro */
        select.border-secondary:focus {
            box-shadow: none;
            border-color: #6eb43f !important;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav id="sidebar" class="shadow active">
            <div class="sidebar-header">
                <h3><i></i> Finanzas</h3>
            </div>

            <ul class="list-unstyled components">
                <li>
                    <a href="{% url 'dashboard' %}"><i class="fas fa-table me-3"></i> Dashboard</a>
                </li>
                <li>
                    <a href="/admin/" target="_blank"><i class="fas fa-cogs me-3"></i> Configuración</a>
                </li>
            </ul>

            <div class="user-section">
                <div class="mb-3 text-center">
                    <i class="fas fa-user-circle fa-2x mb-2 text-light"></i><br>
                    <strong>{{ request.user.username|upper }}</strong>
                </div>
                
                <form action="{% url 'set_language' %}" method="post" class="mb-3">
                    {% csrf_token %}
                    <input name="next" type="hidden" value="{{ redirect_to }}">
                    <select name="language" class="form-select form-select-sm bg-transparent text-white border-secondary" onchange="this.form.submit()">
                        {% get_current_language as LANGUAGE_CODE %}
                        {% get_available_languages as LANGUAGES %}
                        {% for lang in LANGUAGES %}
                            <option value="{{ lang.0 }}" class="text-dark" {% if lang.0 == LANGUAGE_CODE %}selected{% endif %}>
                                {{ lang.1 }}
                            </option>
                        {% endfor %}
                    </select>
                </form>
                
                <form action="{% url 'logout' %}" method="post" class="m-0 text-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-light w-100 fw-bold">
                        <i class="fas fa-sign-out-alt me-2"></i> Salir
                    </button>
                </form>
            </div>
        </nav>

        <div id="content">
            <div class="top-navbar shadow-sm">
                <button type="button" id="sidebarCollapse" class="btn btn-sm btn-outline-secondary border-0" title="Ocultar/Mostrar Menú" style="font-size: 1.2rem;">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="ms-3 text-muted fw-bold small">Gestión de Disponibilidad Bancaria</span>
            </div>

            <main class="main-container">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarCollapse');
            
            toggleBtn.addEventListener('click', function() {
                // Alterna la clase 'active' que mueve el menú hacia la izquierda
                sidebar.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
